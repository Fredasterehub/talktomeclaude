name: Cross-platform smoke

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.os }} / Python 3.12
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile source and tests
        run: python -m compileall -q src tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke CLI and listen import
        run: |
          talktomeclaude --help
          talktomeclaude listen --help
          python -c "import talktomeclaude.listen; print('listen import: ok')"

      - name: Validate hook shell syntax
        if: runner.os == 'Linux'
        run: bash -n hooks/stop-hook.sh
